kind = "web"
previewPath = "/"
title = "DocExchange - Document Exchange Platform"
version = "1.0.0"
id = "artifacts/docexchange"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24881

[services.development]
run = "pnpm --filter @workspace/docexchange run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docexchange", "run", "build" ]
publicDir = "artifacts/docexchange/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24881"
BASE_PATH = "/"
