services:
  - type: web
    name: hydroges-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hydroges-db
          property: connectionString
      - key: PORT
        value: 10000

  - type: web
    name: hydroges-frontend
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && BASE_PATH=/ pnpm --filter @workspace/hydroges-docs run build
    staticPublishPath: artifacts/hydroges-docs/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: hydroges-db
    databaseName: hydroges
    user: hydroges_user
    plan: free
