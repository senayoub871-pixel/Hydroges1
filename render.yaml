services:
  - type: web
    name: docexchange-api
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: docexchange-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: docexchange-db
    plan: free
    region: oregon
